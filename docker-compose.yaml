# docker-compose.yaml
# Compose principal para el entorno de desarrollo del Sistema Académico Cayzedo (SAC).
# Incluye:
#   - sac-api (la aplicación .NET 8)
#   - mongodb (única base de datos en este compose, para auditoría/logs)
#
# IMPORTANTE: La aplicación SIGUE usando PostgreSQL para los datos transaccionales.
# Postgres NO está incluido en este compose. Se debe configurar aparte
# (instalación local, RDS, Cloud SQL, otro compose, etc.). Las variables
# DB_HOST, DB_USER, DB_PASSWORD, DB_NAME, DB_PORT del .env apuntan a esa instancia.

services:
  sac-api:
    build:
      context: .
      dockerfile: ./Services/Sac/Sac.Api/Dockerfile
    container_name: sac-api
    ports:
      - "${HTTP_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ENABLE_SWAGGER: "true"
      IS_DOCKER: "true"
    restart: unless-stopped
